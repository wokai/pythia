<!--- .form-control : Expands input size to full input-group size           --->
<div ng-form="lastItemsQueryForm" novalidate>
<div class="input-group">
  <span class="input-group-text" style="width:20%">Last database items</span>
  <input type="text" ng-ref="lastItemsQueryInput"
    placeholder="Enter number of records" class="form-control"
    data-toggle="tooltip" data-placement="bottom"
    title="Please enter number of returned records"
    ng-enter="$ctrl.submit()"
    ng-model="$ctrl.qry"/>
    <button class="btn btn-outline-secondary" ng-click="$ctrl.clear()"
      data-toggle="tooltip", data-placement="bottom"
      title="Clear input">
      <img src="/icons/x.svg" alt="Clear">
    </button>
    <button class="btn btn-success" ng-click="$ctrl.submit()">Send</button>
</div>
</div>
